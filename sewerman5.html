<body>
<div id="game">
  <div id="title">SEWERMAN 5: LOST IN TIME</div>
  <hr class="sep">
  <div id="output"></div>
  <div id="input-area" style="display:none;">
    <span id="prompt">&gt;</span>
    <input type="text" id="input" autofocus spellcheck="false" autocomplete="off" />
    <button id="undo-btn" disabled>⟲ UNDO</button>
  </div>
</div>
<script>
(function() {
"use strict";

// ===== GAME ENGINE =====
const output = document.getElementById('output');
const inputArea = document.getElementById('input-area');
const inputField = document.getElementById('input');
const promptEl = document.getElementById('prompt');

let currentHandler = null;
let waiting = false;
let gameOver = false;

// Undo system
var undoStack = [];
var currentOptions = null;
var undoBtn = document.getElementById('undo-btn');

function pushUndoPoint() {
  undoStack.push({
    html: output.innerHTML,
    scrollTop: output.scrollTop,
    options: currentOptions
  });
  undoBtn.disabled = false;
}

function undo() {
  if (undoStack.length === 0) return;
  var state = undoStack.pop();
  if (undoStack.length === 0) undoBtn.disabled = true;
  output.innerHTML = state.html;
  output.scrollTop = state.scrollTop;
  waiting = false;
  currentHandler = null;
  removeChoices();
  inputArea.style.display = 'none';
  if (state.options) {
    currentOptions = state.options;
    restoreChoices(state.options);
  }
}

function restoreChoices(options) {
  inputArea.style.display = 'flex';
  promptEl.textContent = 'ENTER CHOICE: ';
  waiting = true;
  currentHandler = function(val) {
    var num = parseInt(val.trim(), 10);
    if (!isNaN(num) && num >= 1 && num <= options.length) {
      selectOption(options[num - 1]);
    }
  };
  var container = document.createElement('div');
  container.id = 'choices';
  options.forEach(function(opt) {
    var btn = document.createElement('button');
    btn.className = 'btn-choice';
    btn.textContent = opt.label;
    btn.addEventListener('click', function() {
      selectOption(opt);
    });
    container.appendChild(btn);
  });
  output.appendChild(container);
  output.scrollTop = output.scrollHeight;
  setTimeout(function() { inputField.focus(); }, 50);
}

undoBtn.addEventListener('click', undo);

function clear() {
  output.innerHTML = '';
  gameOver = false;
}

function print(text) {
  const div = document.createElement('div');
  div.textContent = text;
  output.appendChild(div);
  output.scrollTop = output.scrollHeight;
}

function printDead(text) {
  const div = document.createElement('div');
  div.className = 'dead';
  div.textContent = text;
  output.appendChild(div);
  output.scrollTop = output.scrollHeight;
}

function printWin(text) {
  const div = document.createElement('div');
  div.className = 'win';
  div.textContent = text;
  output.appendChild(div);
  output.scrollTop = output.scrollHeight;
}

function blank() {
  print('');
}

function hr() {
  const div = document.createElement('div');
  div.textContent = '----------------------------------------------------------';
  div.style.opacity = '0.5';
  output.appendChild(div);
  output.scrollTop = output.scrollHeight;
}

function showPrompt(text, callback) {
  promptEl.textContent = text;
  inputArea.style.display = 'flex';
  inputField.value = '';
  waiting = true;
  currentHandler = callback;
  setTimeout(function() { inputField.focus(); }, 50);
}

function selectOption(opt) {
  // Save undo point before transitioning
  pushUndoPoint();
  var c = document.getElementById('choices');
  if (c) { c.querySelectorAll('button').forEach(function(b) { b.disabled = true; }); }
  waiting = false;
  currentHandler = null;
  inputArea.style.display = 'none';
  if (opt.next) { goTo(opt.next); }
  else if (opt.handler) { opt.handler(); }
}

function showChoices(options) {
  currentOptions = options;
  inputArea.style.display = 'flex';
  promptEl.textContent = 'ENTER CHOICE: ';
  waiting = true;
  currentHandler = function(val) {
    var num = parseInt(val.trim(), 10);
    if (!isNaN(num) && num >= 1 && num <= options.length) {
      selectOption(options[num - 1]);
    }
    // invalid input — do nothing, let them try again
  };
  var container = document.createElement('div');
  container.id = 'choices';
  options.forEach(function(opt, i) {
    var btn = document.createElement('button');
    btn.className = 'btn-choice';
    btn.textContent = opt.label;
    btn.addEventListener('click', function() {
      selectOption(opt);
    });
    container.appendChild(btn);
  });
  output.appendChild(container);
  output.scrollTop = output.scrollHeight;
  setTimeout(function() { inputField.focus(); }, 50);
}

function removeChoices() {
  var c = document.getElementById('choices');
  if (c) { c.remove(); }
}

function goTo(nodeId) {
  if (gameOver) return;
  removeChoices();
  inputArea.style.display = 'none';
  waiting = false;
  currentHandler = null;
  var node = nodes[nodeId];
  if (node) {
    node();
  } else {
    print('ERROR: Unknown node "' + nodeId + '"');
  }
}

function restart() {
  undoStack = [];
  undoBtn.disabled = true;
  goTo('start');
}

function showPlayAgain() {
  showChoices([
    { label: '1 - YES, PLAY AGAIN', handler: function() { restart(); } },
    { label: '2 - NO',              handler: function() { /* end */ } }
  ]);
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && currentHandler && waiting) {
    var val = inputField.value;
    inputField.value = '';
    currentHandler(val);
  }
  // Undo: press 'u' when input is empty, or Ctrl+Z
  if ((e.key === 'u' && inputField.value === '' && waiting) ||
      (e.key === 'z' && (e.ctrlKey || e.metaKey))) {
    e.preventDefault();
    undo();
  }
});
